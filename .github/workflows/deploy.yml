name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: loadsim
  ASG_NAME: loadsim-asg

jobs:
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Compilar
        working-directory: app
        run: mvn package -DskipTests -q

      - uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: app/target/*.jar
          retention-days: 1

  deploy:
    name: Build Image, Scan e Deploy
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: app/target/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build imagem Docker
        id: build-image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI=$REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker build -t $IMAGE_URI app/
          echo "uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Scan de vulnerabilidades (Trivy)
        uses: aquasecurity/trivy-action@0.70.0
        with:
          image-ref: ${{ steps.build-image.outputs.uri }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Push imagem
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push ${{ steps.build-image.outputs.uri }}
          docker tag ${{ steps.build-image.outputs.uri }} $REGISTRY/$ECR_REPOSITORY:latest
          docker push $REGISTRY/$ECR_REPOSITORY:latest

      - name: Instance refresh no ASG
        run: |
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name $ASG_NAME \
            --preferences '{"MinHealthyPercentage":50,"InstanceWarmup":90}' \
            --query 'InstanceRefreshId' \
            --output text)
          echo "Refresh iniciado: $REFRESH_ID"

      - name: Resumo
        run: |
          echo "### Deploy concluido" >> $GITHUB_STEP_SUMMARY
          echo "- **Imagem:** ${{ steps.build-image.outputs.uri }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **ASG:** instance refresh rolling em andamento" >> $GITHUB_STEP_SUMMARY
